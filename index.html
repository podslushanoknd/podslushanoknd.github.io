<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Подслушано Калач-на-Дону</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Телеграм-стиль карточка */
        .tg-card {
            max-width: 400px;
            width: 100%;
            background: #0f0f12;
            border-radius: 28px;
            border: 1px solid #2c2c33;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }


        /* Шапка с аватаркой и названием */
        .tg-header {
            padding: 32px 24px 20px;
            text-align: center;
            border-bottom: 1px solid #2c2c33;
        }

.avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;

    border: 3px solid #c084fc; /* обводка */
    box-shadow: 0 0 15px rgba(192, 132, 252, 0.6); /* мягкое свечение */
}
        .title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #8e8e9f;
        }

        /* Блок с аниме девочками */
        .anime-section {
            padding: 24px;
            border-bottom: 1px solid #2c2c33;
        }

        .anime-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c6c7a;
            margin-bottom: 16px;
            text-align: center;
        }

        /* Галерея аниме картинок */
        .anime-grid {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ⚠️ АНИМЕ КАРТИНКИ — МЕНЯЙ ССЫЛКИ В АТРИБУТАХ src ⚠️ */
        .anime-img {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid #3a3a44;
            transition: transform 0.2s, border-color 0.2s;
            background: #1a1a20;
        }

        .anime-img:hover {
            transform: scale(1.05);
            border-color: #c084fc;
        }

        /* Кнопка */
        .button-section {
            padding: 24px;
        }

        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(95deg, #2b70e6, #2481cc);
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            text-decoration: none;
            text-align: center;
        }

        .tg-button:active {
            transform: scale(0.98);
            background: #1f5ec9;
        }

        /* Нижняя плашка с иконками */
        .footer-icons {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 20px 24px 28px;
            border-top: 1px solid #26262e;
            background: #0b0b0e;
        }

        .footer-link {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #8e8e9f;
            font-size: 0.8rem;
            transition: 0.1s;
        }

        .footer-link:hover {
            color: #2b70e6;
        }
    </style>
</head>
<body>
<div class="tg-card">
    <!-- ШАПКА -->
    <div class="tg-header">
        <!-- ========= ⚠️ АВАТАРКА — ВСТАВЬ СВОЮ ССЫЛКУ СЮДА ========= -->
        <img class="avatar" id="groupAvatar" src="file (1).jpg" alt="avatar">
        <h1 class="title">Подслушано<br>Калач-на-Дону</h1>
        <p class="subtitle">говно ебаное</p>
    </div>

    <!-- БЛОК С АНИМЕ ДЕВОЧКАМИ -->
    <div class="anime-section">
        <div class="anime-title">галерея славы</div>
        <div class="anime-grid">
            <!-- ========= ⚠️ АНИМЕ КАРТИНКИ — ВСТАВЛЯЙ СВОИ ССЫЛКИ В SRC ========= -->
            <img class="anime-img" src="file (2).jpg" alt="anime girl">
            <img class="anime-img" src="file (3).jpg" alt="anime girl">
            <img class="anime-img" src="file (4).jpg" alt="anime girl">
            <img class="anime-img" src="file (5).jpg" alt="anime girl">
        </div>
    </div>

    <!-- КНОПКА (ведет на внешний сайт) -->
    <div class="button-section">
        <!-- ========= ⚠️ ССЫЛКА ДЛЯ КНОПКИ — МЕНЯЙ ЗДЕСЬ ========= -->
        <a href="https://t.me/+qFVYqNGdOr1iZTUx" class="tg-button" target="_blank" id="mainButton">
            📢 АНОНИМНО РАССКАЗАТЬ
        </a>
    </div>

    <!-- НИЖНИЕ ИКОНКИ TELEGRAM И КИСЛОТА -->
    <div class="footer-icons">
        <a href="https://t.me/+qFVYqNGdOr1iZTUx" class="footer-link" target="_blank">📱 Telegram</a>
        
    </div>
</div>

<script>
    // =======================================================
    // ⚠️⚠️⚠️ ВСЕ ССЫЛКИ НА КАРТИНКИ МЕНЯЮТСЯ ЗДЕСЬ ⚠️⚠️⚠️
    // =======================================================

    // 1. АВАТАРКА ГРУППЫ (в шапке)
    // ↓↓↓ ЗАМЕНИ ССЫЛКУ НА СВОЮ КАРТИНКУ ↓↓↓
    document.getElementById("groupAvatar").src = "file (1).jpg";
    // 2. АНИМЕ КАРТИНКИ (массив для удобной замены)
    // ↓↓↓ ВСТАВЛЯЙ СВОИ ССЫЛКИ (или имена файлов, например "girl1.png") ↓↓↓
    const animeImages = [
        "file (2).jpg",
        "file (3).jpg",
        "file (4).jpg",
        "file (5).jpg"
    ];

    // применяем аниме картинки к галерее
    const animeImgs = document.querySelectorAll(".anime-img");
    animeImgs.forEach((img, index) => {
        if (animeImages[index]) {
            img.src = animeImages[index];
        }
    });

    // 3. ССЫЛКА ДЛЯ КНОПКИ
    // ↓↓↓ ЗАМЕНИ НА СВОЙ САЙТ/TELEGRAM/ФОРМУ ↓↓↓
    const buttonLink = "https://t.me/+qFVYqNGdOr1iZTUx";
    document.getElementById("mainButton").href = buttonLink;
</script>
</body>
</html>
